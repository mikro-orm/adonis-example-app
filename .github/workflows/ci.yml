name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [24]
    env:
      NODE_ENV: test
      APP_KEY: test-key-for-ci-only
      HOST: localhost
      PORT: 3333
      LOG_LEVEL: error
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit
      - run: node ace test
      - run: node ace build
